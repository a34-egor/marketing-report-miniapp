<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marketing Report</title>
  <meta name="theme-color" content="#0a0f1c" />
  <link rel="stylesheet" href="./styles.css?v=220" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="app-loading">
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <div id="bootScreen" class="boot-screen">
    <div class="boot-loading">
      <div class="boot-spinner" aria-hidden="true"></div>
    </div>
    <div class="boot-denied">
      <div class="denied-icon">🚫</div>
      <h2>Нет доступа</h2>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <div>
        <h1>Маркетинговые отчёты</h1>
        <p class="sub" id="subTitle">Отчёт по циклу и план на следующий</p>
      </div>
      <div class="user-pill" id="userPill">Загрузка…</div>
    </header>

    <nav class="top-tabs" id="topTabs">
      <button type="button" class="tab-btn active" data-view="new-report">Новый</button>
      <button type="button" class="tab-btn" data-view="my-reports">Мои отчёты</button>
      <button type="button" class="tab-btn hidden" data-view="admin-cycles" id="adminCyclesTab">Циклы</button>
      <button type="button" class="tab-btn hidden" data-view="admin-history" id="adminHistoryTab">История</button>
    </nav>

    <main class="content">
      <section id="view-new-report" class="view active">
        <section class="card">
          <div class="section-head">
            <h2 id="formTitle">Новый отчёт</h2>
            <span class="badge hidden" id="editBadge">Редактирование</span>
          </div>

          <label for="cycle">Цикл</label>
          <input id="cycle" type="text" inputmode="numeric" placeholder="Например: 47" />
          <input id="editingReportKey" type="hidden" />
        </section>

        <section class="card">
          <div class="section-head">
            <h2>ГЕО</h2>
            <button id="addGeoBtn" type="button" class="btn btn-secondary btn-sm">+ Добавить</button>
          </div>
          <div id="geoList" class="geo-list"></div>
        </section>

        <section class="card totals">
          <h2>Итоги</h2>
          <div class="totals-grid">
            <div><span>ГЕО</span><strong id="totalGeo">0</strong></div>
            <div><span>Расход</span><strong id="totalSpend">0$</strong></div>
            <div><span>ПДП</span><strong id="totalPdp">0</strong></div>
            <div><span>Средняя цена ПДП</span><strong id="totalAvg">0$</strong></div>
          </div>
        </section>

        <section class="card actions">
          <button id="resetBtn" type="button" class="btn btn-ghost btn-sm">Сбросить</button>
          <button id="previewBtn" type="button" class="btn btn-secondary">Предпросмотр</button>
          <button id="submitBtn" type="button" class="btn btn-primary">Отправить</button>
        </section>
      </section>

      <section id="view-my-reports" class="view">
        <section class="card">
          <div class="section-head">
            <h2>Мои отчёты</h2>
            <button id="refreshMyReportsBtn" type="button" class="btn btn-secondary btn-sm" aria-label="Обновить">↻</button>
          </div>
          <div id="myReportsList" class="list-wrap">
            <div class="empty-state">Загрузка…</div>
          </div>
        </section>
      </section>

      <section id="view-admin-cycles" class="view">
        <section class="card">
          <div class="section-head">
            <h2>Циклы</h2>
            <button id="refreshAdminCyclesBtn" type="button" class="btn btn-secondary btn-sm" aria-label="Обновить">↻</button>
          </div>
          <div id="adminCyclesList" class="list-wrap">
            <div class="empty-state">Загрузка…</div>
          </div>
        </section>
      </section>

      <section id="view-admin-history" class="view">
        <section class="card">
          <div class="section-head">
            <h2>История изменений</h2>
            <button id="refreshAdminHistoryBtn" type="button" class="btn btn-secondary btn-sm" aria-label="Обновить">↻</button>
          </div>
          <div id="adminHistoryList" class="list-wrap">
            <div class="empty-state">Загрузка…</div>
          </div>
        </section>
      </section>

      <section id="previewCard" class="card preview hidden">
        <div class="section-head">
          <h2>Предпросмотр</h2>
          <button id="closePreviewBtn" type="button" class="btn btn-ghost btn-sm">Закрыть</button>
        </div>
        <pre id="previewText"></pre>
      </section>
    </main>
  </div>

  <template id="geoTemplate">
    <article class="geo-item">
      <div class="geo-top">
        <span class="geo-number">#1</span>
        <input class="geo-input" type="text" placeholder="🇸🇬 Название ГЕО" />
        <button type="button" class="remove-geo btn-icon-close" aria-label="Удалить">×</button>
      </div>

      <div class="geo-metrics">
        <div class="geo-metric">
          <label>Расход</label>
          <input class="spend-input" type="text" inputmode="decimal" placeholder="2000" />
        </div>
        <div class="geo-metric">
          <label>ПДП</label>
          <input class="pdp-input" type="text" inputmode="decimal" placeholder="40" />
        </div>
        <div class="geo-metric geo-metric-readonly">
          <label>Ц/ПДП</label>
          <div class="avg-output">0$</div>
        </div>
      </div>

      <details class="plan-details" open>
        <summary>План на следующий цикл</summary>
        <textarea class="plan-input" rows="3" placeholder="Например: масштабировать связку"></textarea>
      </details>
    </article>
  </template>

  <script src="./app.js?v=220"></script>
</body>
</html>
