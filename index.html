<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marketing Report Mini App</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="eyebrow">Telegram Mini App</div>
        <h1>Отчёт по циклу</h1>
        <p class="sub">Заполни цикл и GEO, затем отправь данные.</p>
      </div>
      <div class="user-pill" id="userPill">Загрузка…</div>
    </header>

    <main class="content">
      <section class="card">
        <label for="cycle">Цикл</label>
        <input id="cycle" type="text" placeholder="Например: 47" />
      </section>

      <section class="card">
        <div class="section-head">
          <h2>GEO</h2>
          <button id="addGeoBtn" type="button" class="btn btn-secondary">+ Добавить GEO</button>
        </div>
        <div id="geoList" class="geo-list"></div>
      </section>

      <section class="card totals">
        <h2>Итоги</h2>
        <div class="totals-grid">
          <div><span>GEO</span><strong id="totalGeo">0</strong></div>
          <div><span>Расход</span><strong id="totalSpend">0$</strong></div>
          <div><span>ПДП</span><strong id="totalPdp">0</strong></div>
          <div><span>Средняя цена за ПДП</span><strong id="totalAvg">0$</strong></div>
        </div>
      </section>

      <section class="card actions">
        <button id="previewBtn" type="button" class="btn btn-secondary">Предпросмотр</button>
        <button id="submitBtn" type="button" class="btn btn-primary">Отправить</button>
      </section>

      <section id="previewCard" class="card preview hidden">
        <div class="section-head">
          <h2>Предпросмотр</h2>
          <button id="closePreviewBtn" type="button" class="btn btn-ghost">Закрыть</button>
        </div>
        <pre id="previewText"></pre>
      </section>

      <section id="statusCard" class="card status hidden">
        <div id="statusText"></div>
      </section>
    </main>
  </div>

  <template id="geoTemplate">
    <article class="geo-item">
      <div class="geo-top">
        <div class="geo-title">GEO <span class="geo-number"></span></div>
        <button type="button" class="remove-geo btn btn-ghost">Удалить</button>
      </div>

      <label>GEO</label>
      <input class="geo-input" type="text" placeholder="Например: Сингапур / SG / 🇸🇬" />

      <div class="grid-2">
        <div>
          <label>Расход</label>
          <input class="spend-input" type="text" inputmode="decimal" placeholder="Например: 2000" />
        </div>
        <div>
          <label>Количество ПДП</label>
          <input class="pdp-input" type="text" inputmode="decimal" placeholder="Например: 40" />
        </div>
      </div>

      <div class="readonly-row">
        <span>Цена за ПДП</span>
        <strong class="avg-output">0$</strong>
      </div>

      <label>План на следующий цикл</label>
      <textarea class="plan-input" rows="3" placeholder="Например: масштабировать связку"></textarea>
    </article>
  </template>

  <script src="./app.js?v=2"></script>
</body>
</html>
