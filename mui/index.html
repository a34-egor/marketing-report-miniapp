<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marketing Report — MUI Draft</title>
  <meta name="theme-color" content="#1976d2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="./styles.css?v=mui1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="toastContainer" class="snackbar-container" aria-live="polite"></div>

  <header class="app-bar">
    <h1>Маркетинговые отчёты</h1>
    <div class="user-chip" id="userPill">Загрузка…</div>
  </header>

  <div class="app">
    <main class="content">
      <section id="view-new-report" class="view active">
        <div class="form-card">
          <div class="section-head">
            <h2 id="formTitle">Новый отчёт</h2>
            <span class="badge hidden" id="editBadge">Редактирование</span>
          </div>
          <div class="text-field">
            <input id="cycle" type="text" inputmode="numeric" placeholder=" " />
            <label for="cycle">Цикл</label>
          </div>
          <input id="editingReportKey" type="hidden" />
        </div>

        <div class="form-card">
          <div class="section-head">
            <h2>ГЕО</h2>
            <button id="addGeoBtn" type="button" class="btn btn-text">+ ДОБАВИТЬ</button>
          </div>
          <div id="geoList" class="geo-list"></div>
        </div>

        <div class="form-card totals-card">
          <div class="section-head"><h2>Итоги</h2></div>
          <div class="totals-grid">
            <div><span>ГЕО</span><strong id="totalGeo">0</strong></div>
            <div><span>Расход</span><strong id="totalSpend">0$</strong></div>
            <div><span>ПДП</span><strong id="totalPdp">0</strong></div>
            <div><span>Ср. цена ПДП</span><strong id="totalAvg">0$</strong></div>
          </div>
        </div>

        <div class="actions-row">
          <button id="resetBtn" type="button" class="btn btn-text">Сбросить</button>
          <button id="previewBtn" type="button" class="btn btn-outlined">Предпросмотр</button>
          <button id="submitBtn" type="button" class="btn btn-contained btn-primary">Отправить</button>
        </div>
      </section>

      <section id="view-my-reports" class="view">
        <div class="list-header">
          <h2>Мои отчёты</h2>
          <button id="refreshMyReportsBtn" type="button" class="btn-icon-only" aria-label="Обновить">↻</button>
        </div>
        <div id="myReportsList" class="list-wrap">
          <div class="empty-state">Загрузка…</div>
        </div>
      </section>

      <section id="view-admin-cycles" class="view">
        <div class="list-header">
          <h2>Циклы</h2>
          <button id="refreshAdminCyclesBtn" type="button" class="btn-icon-only" aria-label="Обновить">↻</button>
        </div>
        <div id="adminCyclesList" class="list-wrap">
          <div class="empty-state">Загрузка…</div>
        </div>
      </section>

      <section id="view-admin-history" class="view">
        <div class="list-header">
          <h2>История</h2>
          <button id="refreshAdminHistoryBtn" type="button" class="btn-icon-only" aria-label="Обновить">↻</button>
        </div>
        <div id="adminHistoryList" class="list-wrap">
          <div class="empty-state">Загрузка…</div>
        </div>
      </section>

      <section id="previewCard" class="form-card preview hidden">
        <div class="section-head">
          <h2>Предпросмотр</h2>
          <button id="closePreviewBtn" type="button" class="btn btn-text">Закрыть</button>
        </div>
        <pre id="previewText"></pre>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" id="topTabs">
    <button type="button" class="tab-btn active" data-view="new-report">
      <span class="bn-icon">📝</span>
      <span class="bn-label">Новый</span>
    </button>
    <button type="button" class="tab-btn" data-view="my-reports">
      <span class="bn-icon">📋</span>
      <span class="bn-label">Мои</span>
    </button>
    <button type="button" class="tab-btn hidden" data-view="admin-cycles" id="adminCyclesTab">
      <span class="bn-icon">📊</span>
      <span class="bn-label">Циклы</span>
    </button>
    <button type="button" class="tab-btn hidden" data-view="admin-history" id="adminHistoryTab">
      <span class="bn-icon">🕘</span>
      <span class="bn-label">История</span>
    </button>
  </nav>

  <template id="geoTemplate">
    <article class="geo-item">
      <div class="geo-top">
        <span class="geo-number">#1</span>
        <div class="text-field text-field-flex">
          <input class="geo-input" type="text" placeholder=" " />
          <label>Название ГЕО</label>
        </div>
        <button type="button" class="remove-geo btn-icon-close" aria-label="Удалить">×</button>
      </div>

      <div class="geo-metrics">
        <div class="text-field">
          <input class="spend-input" type="text" inputmode="decimal" placeholder=" " />
          <label>Расход</label>
        </div>
        <div class="text-field">
          <input class="pdp-input" type="text" inputmode="decimal" placeholder=" " />
          <label>ПДП</label>
        </div>
        <div class="readonly-field">
          <span class="readonly-label">Ц/ПДП</span>
          <span class="avg-output">0$</span>
        </div>
      </div>

      <details class="plan-details" open>
        <summary>План на следующий цикл</summary>
        <div class="text-field">
          <textarea class="plan-input" rows="3" placeholder=" "></textarea>
          <label>План</label>
        </div>
      </details>
    </article>
  </template>

  <script src="../app.js?v=mui1"></script>
</body>
</html>
