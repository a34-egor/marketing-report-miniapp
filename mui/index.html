<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Marketing Report — Editorial Draft</title>
  <meta name="theme-color" content="#f5f1e8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="./styles.css?v=ed1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <main class="page">

    <header class="masthead">
      <div class="mast-rule mast-rule-thick"></div>
      <div class="mast-band">
        <span class="mast-issue">№ <span id="mastIssueNum">—</span></span>
        <span class="mast-date" id="mastDate">2026 / IV</span>
        <span class="mast-byline" id="userPill">…</span>
      </div>
      <div class="mast-rule"></div>
      <h1 class="mast-title"><em>Маркетинг.</em><br/>Отчёт.</h1>
      <div class="mast-rule"></div>
      <nav class="mast-nav" id="topTabs">
        <button type="button" class="tab-btn nav-link active" data-view="new-report">Отчёт</button>
        <span class="nav-sep">·</span>
        <button type="button" class="tab-btn nav-link" data-view="my-reports">Архив</button>
        <span class="nav-sep tab-sep-admin hidden">·</span>
        <button type="button" class="tab-btn nav-link hidden" data-view="admin-cycles" id="adminCyclesTab">Циклы</button>
        <span class="nav-sep tab-sep-admin hidden">·</span>
        <button type="button" class="tab-btn nav-link hidden" data-view="admin-history" id="adminHistoryTab">Хроника</button>
      </nav>
      <div class="mast-rule mast-rule-thick"></div>
    </header>

    <section id="view-new-report" class="view active">

      <article class="dossier">
        <div class="dossier-eyebrow">
          <span id="formTitle">Запись отчёта</span>
          <span class="badge hidden" id="editBadge">Правка</span>
        </div>
        <div class="dossier-cycle">
          <label for="cycle" class="dossier-cycle-label">Цикл</label>
          <input id="cycle" type="text" inputmode="numeric" class="dossier-cycle-input" placeholder="—" />
          <input id="editingReportKey" type="hidden" />
        </div>
      </article>

      <div class="section-rule">
        <span class="section-rule-label">Регионы</span>
      </div>

      <ol id="geoList" class="geo-list"></ol>

      <button id="addGeoBtn" type="button" class="add-row">+ Добавить регион</button>

      <div class="section-rule">
        <span class="section-rule-label">Итог</span>
      </div>

      <article class="totals">
        <div class="totals-grid">
          <div class="tot"><span>Регионов</span><strong id="totalGeo">0</strong></div>
          <div class="tot tot-big"><span>Расход</span><strong id="totalSpend">0$</strong></div>
          <div class="tot"><span>ПДП</span><strong id="totalPdp">0</strong></div>
          <div class="tot tot-big"><span>Цена / ПДП</span><strong id="totalAvg">0$</strong></div>
        </div>
      </article>

      <div class="colophon-rule"></div>

      <footer class="colophon">
        <div class="colophon-meta">
          <button id="resetBtn" type="button" class="ink-link">сбросить</button>
          <span class="ink-link-sep">·</span>
          <button id="previewBtn" type="button" class="ink-link">предпросмотр →</button>
        </div>
        <button id="submitBtn" type="button" class="press">
          <span class="press-label">К публикации</span>
          <span class="press-arrow">→</span>
        </button>
      </footer>
    </section>

    <section id="view-my-reports" class="view">
      <header class="archive-head">
        <h2>Архив отчётов</h2>
        <button id="refreshMyReportsBtn" type="button" class="ink-link" aria-label="Обновить">↻ обновить</button>
      </header>
      <div id="myReportsList" class="list-wrap">
        <div class="empty-state">Загрузка…</div>
      </div>
    </section>

    <section id="view-admin-cycles" class="view">
      <header class="archive-head">
        <h2>Циклы</h2>
        <button id="refreshAdminCyclesBtn" type="button" class="ink-link" aria-label="Обновить">↻ обновить</button>
      </header>
      <div id="adminCyclesList" class="list-wrap">
        <div class="empty-state">Загрузка…</div>
      </div>
    </section>

    <section id="view-admin-history" class="view">
      <header class="archive-head">
        <h2>Хроника изменений</h2>
        <button id="refreshAdminHistoryBtn" type="button" class="ink-link" aria-label="Обновить">↻ обновить</button>
      </header>
      <div id="adminHistoryList" class="list-wrap">
        <div class="empty-state">Загрузка…</div>
      </div>
    </section>

    <section id="previewCard" class="preview-sheet hidden">
      <header class="preview-head">
        <h2>Предпросмотр</h2>
        <button id="closePreviewBtn" type="button" class="ink-link">закрыть ✕</button>
      </header>
      <pre id="previewText"></pre>
    </section>
  </main>

  <template id="geoTemplate">
    <li class="geo-item">
      <div class="geo-mark">
        <span class="geo-number">I.</span>
        <button type="button" class="remove-geo geo-remove" aria-label="Удалить">×</button>
      </div>

      <input class="geo-input" type="text" placeholder="Название региона" />

      <div class="geo-meta">
        <div class="m-cell">
          <label>Расход</label>
          <input class="spend-input" type="text" inputmode="decimal" placeholder="—" />
          <span class="m-suffix">$</span>
        </div>
        <div class="m-cell">
          <label>ПДП</label>
          <input class="pdp-input" type="text" inputmode="decimal" placeholder="—" />
        </div>
        <div class="m-cell m-cell-readonly">
          <label>Цена</label>
          <span class="avg-output">—</span>
        </div>
      </div>

      <details class="plan-details" open>
        <summary>Перспективы следующего цикла</summary>
        <textarea class="plan-input" rows="3" placeholder="Например: масштабировать связку"></textarea>
      </details>
    </li>
  </template>

  <script>
    // Mirror cycle input into masthead "№ X" so the page header reads
    // like an issue number — pure cosmetic, doesn't touch app.js logic.
    (function () {
      const cycle = document.getElementById('cycle');
      const out = document.getElementById('mastIssueNum');
      const update = () => {
        const v = (cycle.value || '').trim();
        out.textContent = v || '—';
      };
      cycle.addEventListener('input', update);
      // App.js may set cycle.value when editing — observe via mutation
      const mo = new MutationObserver(update);
      mo.observe(cycle, { attributes: true, attributeFilter: ['value'] });
      // Polling fallback (cheap), in case .value is set programmatically
      let last = '';
      setInterval(() => { if (cycle.value !== last) { last = cycle.value; update(); } }, 400);
      update();

      // Year label
      const dateEl = document.getElementById('mastDate');
      if (dateEl) {
        const d = new Date();
        const month = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'][d.getMonth()];
        dateEl.textContent = d.getFullYear() + ' / ' + month;
      }

      // Show admin separators when admin tabs become visible
      const observeAdmin = () => {
        const isAdmin = !document.getElementById('adminCyclesTab').classList.contains('hidden');
        document.querySelectorAll('.tab-sep-admin').forEach(s => s.classList.toggle('hidden', !isAdmin));
      };
      const adminMo = new MutationObserver(observeAdmin);
      adminMo.observe(document.getElementById('adminCyclesTab'), { attributes: true, attributeFilter: ['class'] });
      observeAdmin();
    })();
  </script>

  <script src="../app.js?v=ed1"></script>
</body>
</html>
